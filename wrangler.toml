name = "cloudflare-vless"
main = "worker.js"
compatibility_date = "2026-05-27"

[vars]
UUID = "7b84ddae-ed2c-4b87-9fe9-f396d1bdb446"
PROXYIP = ""

# For sensitive values, prefer `wrangler secret put` over [vars]:
#   wrangler secret put UUID
#   wrangler secret put PROXYIP

[triggers]
crons = ["*/10 * * * *"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[placement]
host = "fnnas.nadav.com.cn:5666"
